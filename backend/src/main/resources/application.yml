spring:
  application:
    name: hridaya-creations-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    # DB_URL wins if provided (e.g. docker-compose); otherwise built from host/port/name
    # so managed providers (Render/Railway/Neon) can inject their connection parts.
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hridaya_creations}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HridayaHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
          time_zone: UTC
        order_inserts: true
        order_updates: true
    show-sql: ${JPA_SHOW_SQL:false}

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  # PaaS platforms (Render/Railway/Heroku) inject PORT; fall back to SERVER_PORT then 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

# ----------------------------------------------------------------------
# Application specific configuration
# ----------------------------------------------------------------------
app:
  jwt:
    secret: ${JWT_SECRET:bXlfc3VwZXJfc2VjdXJlX2p3dF9zZWNyZXRfa2V5X2Zvcl9ocmlkYXlhX2NyZWF0aW9uc18yMDI2X3Byb2R1Y3Rpb25fdXNl}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:3600000}        # 1 hour
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}    # 7 days
    issuer: ${JWT_ISSUER:hridaya-creations}
    token-prefix: "Bearer "
    header: Authorization

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    exposed-headers: Authorization
    allow-credentials: true
    max-age: 3600

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
    api-key: ${CLOUDINARY_API_KEY:000000000000000}
    api-secret: ${CLOUDINARY_API_SECRET:secret}
    folder: ${CLOUDINARY_FOLDER:hridaya-creations}
    enabled: ${CLOUDINARY_ENABLED:true}

  admin:
    email: ${ADMIN_EMAIL:admin@ridhayacreations.com}
    password: ${ADMIN_PASSWORD:Admin@12345}
    first-name: ${ADMIN_FIRST_NAME:Hridaya}
    last-name: ${ADMIN_LAST_NAME:Admin}
    mobile: ${ADMIN_MOBILE:9999999999}

  order:
    gst-percentage: ${ORDER_GST_PERCENTAGE:18}
    delivery-charge: ${ORDER_DELIVERY_CHARGE:50}
    free-delivery-threshold: ${ORDER_FREE_DELIVERY_THRESHOLD:500}

  frontend:
    reset-password-url: ${FRONTEND_RESET_PASSWORD_URL:http://localhost:3000/reset-password}

  mail:
    from: ${MAIL_FROM:no-reply@hridayacreations.com}
    enabled: ${MAIL_ENABLED:false}

  seed:
    sample-data-enabled: ${SEED_SAMPLE_DATA:true}

# ----------------------------------------------------------------------
# OpenAPI / Swagger
# ----------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json

# ----------------------------------------------------------------------
# Actuator
# ----------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# ----------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.hridayacreations: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/hridaya-creations.log}
