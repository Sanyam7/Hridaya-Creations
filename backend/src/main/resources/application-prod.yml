spring:
  jpa:
    # Defaults are production-safe; override JPA_DDL_AUTO=update for the very first deploy
    # so Hibernate can create the schema, then switch back to validate.
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false
        # Isolate all tables under a dedicated schema. This lets the backend safely
        # share a PostgreSQL instance with other apps (their tables stay in `public`).
        # `create_namespaces=true` makes Hibernate emit `CREATE SCHEMA IF NOT EXISTS`
        # during schema generation, so the schema is provisioned automatically.
        default_schema: ${JPA_DEFAULT_SCHEMA:hridaya}
        hbm2ddl:
          create_namespaces: true

logging:
  level:
    root: WARN
    com.hridayacreations: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

app:
  seed:
    sample-data-enabled: ${SEED_SAMPLE_DATA:false}
