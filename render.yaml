# =====================================================================
# Render Blueprint — Hridaya Creations backend
#
# The live backend is deployed at:
#   https://hridaya-creations-backend.onrender.com   (Docker, region: oregon)
#
# DATABASE NOTE:
#   Render's free tier allows only ONE free PostgreSQL per account. This
#   backend therefore SHARES an existing PostgreSQL instance and isolates
#   all of its tables under a dedicated `hridaya` schema (see
#   JPA_DEFAULT_SCHEMA + Hibernate create_namespaces in application-prod.yml).
#   Because the DB is shared/external to this blueprint, the connection
#   values below are marked `sync: false` and must be entered in the Render
#   dashboard (never commit DB credentials to a public repo).
#
#   To instead provision a DEDICATED database, uncomment the `databases:`
#   block, wire DB_* via `fromDatabase`, and drop JPA_DEFAULT_SCHEMA.
#
# Deploy: Render Dashboard -> New -> Blueprint -> connect this repo.
# Docs:   https://render.com/docs/blueprint-spec
# =====================================================================

# databases:
#   - name: hridaya-postgres
#     databaseName: hridaya_creations
#     user: hridaya
#     plan: free
#     region: oregon

services:
  - type: web
    name: hridaya-creations-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    # Monorepo: only rebuild when backend files change.
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # First boot creates the schema/tables. After a successful first deploy
      # you may switch this to "validate" in the dashboard for stricter prod.
      - key: JPA_DDL_AUTO
        value: update
      # All tables are created/queried under this Postgres schema so the app
      # can safely share a database instance with other projects.
      - key: JPA_DEFAULT_SCHEMA
        value: hridaya
      - key: SEED_SAMPLE_DATA
        value: "true"
      - key: CLOUDINARY_ENABLED
        value: "false"
      # Recommended: replace "*" with your exact Netlify URL.
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      # Shared/external PostgreSQL connection — set these in the dashboard.
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
